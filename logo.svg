<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 66" fill="none" role="img" aria-label="Cryozen Klíma logó">

  <!-- Bal oldali zöld hangsúlysáv -->
  <rect x="0" y="4" width="3.5" height="58" rx="1.75" fill="#2a7a4b"/>

  <!-- CRYOZEN főszöveg -->
  <text
    x="14" y="44"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="36"
    font-weight="800"
    letter-spacing="-0.5"
  >
    <tspan fill="#2a7a4b">CRYO</tspan><tspan fill="#1f5c38">ZEN</tspan>
  </text>

  <!-- KLÍMA alcím -->
  <text
    x="16" y="60"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="11"
    font-weight="700"
    letter-spacing="7"
    fill="#8a8a8a"
  >KLÍMA</text>

</svg>
